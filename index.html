<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Button</title>
    <style>
        .container {
            border: 1px solid #a9a9a9;
            padding: 20px;
            width: 150px;
            text-align: left;
            font-family: "Times New Roman", Times, serif;
        }
        
        #displayText {
            font-size: 24px;
            color: black;
            margin-bottom: 25px;
        }
        
        #actionButton {
            font-size: 16px;
            padding: 4px 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="displayText">Hello</div>
        <button id="actionButton">Button</button>
    </div>

    <script>
        // Get the text and button elements
        const textElement = document.getElementById('displayText');
        const buttonElement = document.getElementById('actionButton');

        // 1. Change color to magenta when the mouse is over the button
        buttonElement.addEventListener('mouseover', () => {
            textElement.style.color = 'magenta';
        });

        // Optional: Revert color back to black when the mouse leaves the button
        buttonElement.addEventListener('mouseout', () => {
            textElement.style.color = 'black';
        });

        // 2. Change text content when the button is clicked
        buttonElement.addEventListener('click', () => {
            textElement.textContent = 'Mouse Click';
            textElement.style.color = 'magenta'; // Ensures it stays magenta upon click
        });
    </script>

</body>
</html>
